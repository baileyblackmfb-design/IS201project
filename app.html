<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART Goal Builder</title>
    <style>
        :root {
            --bg: #faf8f5;
            --panel: #ffffff;
            --text: #2b2b2b;
            --muted: #888888;
            --primary: #b8956a;
            --accent: #87ceeb;
            --danger: #d64545;
            --shadow: 0 20px 50px rgba(43, 43, 43, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(180deg, #faf8f5 0%, #f5f3f0 100%);
            color: var(--text);
        }

        .app-shell {
            max-width: 760px;
            margin: 0 auto;
            padding: 32px 20px 40px;
        }

        .hero {
            margin-bottom: 24px;
            padding: 26px 24px;
            border-radius: 24px;
            background: linear-gradient(135deg, #b8956a 0%, #ca227b 100%);
            color: #2b2b2b;
            box-shadow: var(--shadow);
        }

        .hero h1 {
            margin: 0 0 12px;
            font-size: clamp(2rem, 2.8vw, 3rem);
            line-height: 1.05;
        }

        .hero p {
            margin: 0;
            max-width: 680px;
            color: rgba(43, 43, 43, 0.9);
            font-size: 1rem;
        }

        .return-link {
            display: inline-block;
            margin-top: 18px;
            color: #2b2b2b;
            text-decoration: underline;
            font-weight: 600;
        }

        .return-link:hover {
            color: #555555;
        }

        .card {
            background: var(--panel);
            border-radius: 24px;
            padding: 24px;
            box-shadow: var(--shadow);
        }

        .top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        .progress-info {
            width: 100%;
        }

        .progress-info span {
            display: block;
            font-size: 0.95rem;
            color: var(--muted);
            margin-bottom: 10px;
        }

        .progress-bar {
            width: 100%;
            height: 12px;
            border-radius: 999px;
            background: #e8e8e8;
            overflow: hidden;
        }

        .progress-fill {
            width: 0;
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, #b8956a, #ff1493);
            transition: width 0.35s ease;
        }

        .screen {
            min-height: 320px;
        }

        .step-card,
        .summary-card {
            display: grid;
            gap: 18px;
        }

        .step-tag,
        .step-tag-summary {
            display: inline-flex;
            align-items: center;
            padding: 10px 16px;
            border-radius: 999px;
            background: rgba(184, 149, 106, 0.15);
            color: #b8956a;
            font-weight: 600;
            font-size: 0.9rem;
            width: fit-content;
        }

        .step-tag-summary {
            background: rgba(202, 34, 123, 0.15);
            color: #ca227b;
        }

        .step-card h2,
        .summary-card h2 {
            margin: 0;
            font-size: 1.5rem;
            line-height: 1.3;
        }

        .field-group {
            display: grid;
            gap: 10px;
        }

        .field-group label {
            font-weight: 600;
            color: var(--text);
        }

        textarea {
            width: 100%;
            min-height: 130px;
            border: 1px solid #d9d9d9;
            border-radius: 18px;
            padding: 16px;
            font-size: 1rem;
            font-family: inherit;
            color: var(--text);
            resize: vertical;
            background: #fefdfb;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(184, 149, 106, 0.1);
        }

        .error-message {
            color: var(--danger);
            font-size: 0.95rem;
        }

        .hidden {
            display: none !important;
        }

        .actions {
            margin-top: 28px;
            display: flex;
            justify-content: flex-end;
            gap: 14px;
            flex-wrap: wrap;
        }

        .button {
            border: none;
            cursor: pointer;
            border-radius: 16px;
            padding: 14px 22px;
            font-size: 1rem;
            font-weight: 700;
            transition: transform 0.15s ease, box-shadow 0.15s ease, background-color 0.15s ease;
        }

        .button:hover {
            transform: translateY(-1px);
        }

        .button-primary {
            background: linear-gradient(135deg, #b8956a, #ff1493);
            color: #2b2b2b;
            box-shadow: 0 12px 24px rgba(184, 149, 106, 0.15);
        }

        .button-secondary {
            background: #f0f0f0;
            color: var(--text);
        }

        .summary-item {
            padding: 16px;
            border-radius: 18px;
            background: #f9f8f6;
            border: 1px solid #e8e8e8;
            line-height: 1.6;
        }

        .final-paragraph {
            padding: 18px;
            border-radius: 18px;
            background: rgba(202, 34, 123, 0.12);
            color: var(--text);
            line-height: 1.8;
            font-size: 1rem;
        }

        @media (max-width: 640px) {
            .app-shell {
                padding: 20px 16px 28px;
            }

            .top-row {
                flex-direction: column;
                align-items: stretch;
            }

            .actions {
                justify-content: stretch;
            }
        }
    </style>
</head>
<body>
    <div class="app-shell">
        <header class="hero">
            <div>
                <h1>SMART Goal Builder</h1>
                <p>Turn a general idea into a clear, actionable SMART goal through guided prompts.</p>
                <a class="return-link" href="scratch.html">Back to Summer Goals Page</a>
            </div>
        </header>

        <main class="card">
            <div class="top-row">
                <div class="progress-info">
                    <span id="progressLabel">Step 1 of 6</span>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                </div>
                <button id="restartBtn" class="button button-secondary hidden" type="button">Restart</button>
            </div>

            <section id="screenArea" class="screen"></section>

            <div class="actions">
                <button id="backBtn" class="button button-secondary" type="button">Back</button>
                <button id="nextBtn" class="button button-primary" type="button">Next</button>
            </div>
        </main>
    </div>

    <script>
        const steps = [
            {
                key: 'baseGoal',
                title: 'Start with a general goal',
                prompt: 'Enter a general goal title (for example: "Get in shape").',
                placeholder: 'My goal is to...'
            },
            {
                key: 'specific',
                title: 'Specific',
                prompt: 'What exactly do you want to accomplish?',
                placeholder: 'Describe the details of your goal.'
            },
            {
                key: 'measurable',
                title: 'Measurable',
                prompt: 'How will you measure success?',
                placeholder: 'Name the way you will track progress.'
            },
            {
                key: 'achievable',
                title: 'Achievable',
                prompt: 'Is this goal realistic? What resources do you need?',
                placeholder: 'Explain how you can reach this goal.'
            },
            {
                key: 'relevant',
                title: 'Relevant',
                prompt: 'Why is this goal important to you?',
                placeholder: 'Share the reason this goal matters.'
            },
            {
                key: 'timebound',
                title: 'Time-bound',
                prompt: 'When do you want to achieve this goal?',
                placeholder: 'Enter a deadline or target date.'
            }
        ];

        const state = {
            baseGoal: '',
            specific: '',
            measurable: '',
            achievable: '',
            relevant: '',
            timebound: ''
        };

        const screenArea = document.getElementById('screenArea');
        const backBtn = document.getElementById('backBtn');
        const nextBtn = document.getElementById('nextBtn');
        const restartBtn = document.getElementById('restartBtn');
        const progressLabel = document.getElementById('progressLabel');
        const progressFill = document.getElementById('progressFill');

        let currentStep = 0;

        function render() {
            if (currentStep === steps.length) {
                renderSummary();
            } else {
                renderStep();
            }
            updateButtons();
            updateProgress();
        }

        function renderStep() {
            const step = steps[currentStep];

            screenArea.innerHTML = `
                <div class="step-card">
                    <div class="step-tag">${step.title}</div>
                    <h2>${step.prompt}</h2>
                    <div class="field-group">
                        <label for="stepInput">Your answer</label>
                        <textarea id="stepInput" rows="4" placeholder="${step.placeholder}">${state[step.key] || ''}</textarea>
                        <div id="errorMessage" class="error-message hidden">Please enter a response before continuing.</div>
                    </div>
                </div>
            `;

            document.getElementById('stepInput').focus();
        }

        function renderSummary() {
            screenArea.innerHTML = `
                <div class="summary-card">
                    <div class="step-tag step-tag-summary">Final SMART Goal</div>
                    <h2>Your structured goal is ready</h2>
                    <div class="summary-item"><strong>General Goal:</strong> ${escapeHtml(state.baseGoal)}</div>
                    <div class="summary-item"><strong>Specific:</strong> ${escapeHtml(state.specific)}</div>
                    <div class="summary-item"><strong>Measurable:</strong> ${escapeHtml(state.measurable)}</div>
                    <div class="summary-item"><strong>Achievable:</strong> ${escapeHtml(state.achievable)}</div>
                    <div class="summary-item"><strong>Relevant:</strong> ${escapeHtml(state.relevant)}</div>
                    <div class="summary-item"><strong>Time-bound:</strong> ${escapeHtml(state.timebound)}</div>
                </div>
            `;
        }

        function updateButtons() {
            backBtn.disabled = currentStep === 0;
            nextBtn.textContent = currentStep === steps.length - 1 ? 'Finish' : 'Next';
            restartBtn.classList.toggle('hidden', currentStep !== steps.length);
            backBtn.classList.toggle('hidden', currentStep === steps.length);
            nextBtn.classList.toggle('hidden', currentStep === steps.length);
        }

        function updateProgress() {
            const progress = currentStep === steps.length ? 1 : (currentStep / steps.length);
            progressFill.style.width = `${Math.round(progress * 100)}%`;
            progressLabel.textContent = currentStep === steps.length ? 'Summary' : `Step ${currentStep + 1} of ${steps.length}`;
        }

        function validateInput() {
            const input = document.getElementById('stepInput');
            if (!input) return true;
            const isValid = input.value.trim().length > 0;
            const error = document.getElementById('errorMessage');
            if (error) {
                error.classList.toggle('hidden', isValid);
            }
            return isValid;
        }

        function saveInput() {
            const input = document.getElementById('stepInput');
            if (!input) return;
            state[steps[currentStep].key] = input.value.trim();
        }

        nextBtn.addEventListener('click', () => {
            if (!validateInput()) return;
            saveInput();
            currentStep = Math.min(currentStep + 1, steps.length);
            render();
        });

        backBtn.addEventListener('click', () => {
            if (currentStep === 0) return;
            currentStep -= 1;
            render();
        });

        restartBtn.addEventListener('click', () => {
            Object.keys(state).forEach(key => state[key] = '');
            currentStep = 0;
            render();
        });

        function escapeHtml(value) {
            if (!value) return '';
            return value.replace(/&/g, '&amp;')
                        .replace(/</g, '&lt;')
                        .replace(/>/g, '&gt;')
                        .replace(/"/g, '&quot;')
                        .replace(/'/g, '&#39;');
        }

        render();
    </script>
</body>
</html>
